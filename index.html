<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bronte – Content Organization</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Aleo:wght@700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fff;
  --sidebar-bg: #fff;
  --sidebar-border: #E0E5EB;
  --nav-active-bg: #F5F6F9;
  --text-primary: #636C85;
  --text-secondary: #636C85;
  --text-muted: #636C85;
  --text-active: #323232;
  --accent: #36609E;
  --accent-light: #EAF0F8;
  --border: #e5e7eb;
  --row-hover: #f9fafb;
  --btn-primary: #36609E;
  --btn-primary-hover: #2d5189;
  --filter-bg: #f3f4f6;
  --filter-active-bg: #fff;
  --control-border: #E0E2E7;
  --shadow-md: 0 4px 16px rgba(0,0,0,0.11);
}
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text-primary); display:flex; height:100vh; overflow:hidden; font-size:14px; -webkit-font-smoothing:antialiased; }

/* SIDEBAR — 284px wide */
.sidebar { width:284px; min-width:284px; background:var(--sidebar-bg); border-right:1px solid var(--sidebar-border); display:flex; flex-direction:column; height:100vh; overflow:hidden; }
.sidebar-top { flex-shrink:0; }

/* Logo: 76px tall, 24px L/R padding, Bronte = Aleo Bold 24pt */
.logo { display:flex; align-items:center; gap:8px; padding:0 24px; height:76px; font-family:'Aleo', serif; font-size:24px; font-weight:700; letter-spacing:0.2px; color:var(--text-active); }
.beta { font-family:'Inter', sans-serif; font-size:10px; font-weight:800; background:var(--border); color:var(--text-secondary); padding:2px 6px; border-radius:4px; letter-spacing:0.5px; text-transform:uppercase; }

/* Section labels: 18px tall container, 8px below before first nav item */
.sidebar-section-label { font-size:12px; font-weight:500; color:#98A0B8; padding:0 24px; margin:32px 0 8px; display:flex; align-items:center; height:18px; line-height:18px; white-space:nowrap; letter-spacing:0.04em; }

/* My Workspace nav group: no extra top padding, label provides 8px bottom */
.nav-group { padding:0 0 8px; display:flex; flex-direction:column; gap:4px; }

/* Nav items: 40px tall, 12px L/R margin, 10px icon gap */
.nav-item { display:flex; align-items:center; gap:10px; padding:0 12px; height:40px; min-height:40px; max-height:40px; cursor:pointer; color:var(--text-secondary); font-size:14px; font-weight:600; transition:background 0.1s,color 0.1s; user-select:none; border-radius:6px; margin:0 12px; overflow:hidden; white-space:nowrap; }
.nav-item:hover { background:var(--nav-active-bg); color:var(--text-active); }
.nav-item.active { background:var(--nav-active-bg); color:var(--text-active); font-weight:600; }
/* Icon wrapper: exactly 20px wide, centered */
.nav-item svg { flex-shrink:0; opacity:0.5; width:20px; height:20px; }
.nav-item.active svg { opacity:1; }
.nav-item:hover svg { opacity:0.85; }

/* Team Workspaces section label */
.workspace-section-label { font-size:12px; font-weight:500; color:#98A0B8; padding:0 24px; margin:32px 0 8px; height:18px; line-height:18px; white-space:nowrap; display:flex; align-items:center; letter-spacing:0.04em; }

/* Workspace scroll: macOS-style auto-hiding scrollbar */
.workspace-scroll { flex:1; overflow-y:auto; padding-bottom:20px; scrollbar-width:thin; scrollbar-color:transparent transparent; display:flex; flex-direction:column; gap:4px; }
.workspace-scroll:hover { scrollbar-color:#d1d5db transparent; }
.workspace-scroll::-webkit-scrollbar { width:6px; }
.workspace-scroll::-webkit-scrollbar-track { background:transparent; }
.workspace-scroll::-webkit-scrollbar-thumb { background:transparent; border-radius:3px; transition:background 0.25s; }
.workspace-scroll:hover::-webkit-scrollbar-thumb { background:#d1d5db; }

/* Workspace nav items: same 40px locked height, text truncates */
.workspace-scroll .nav-item { margin:0 12px; padding:0 12px; }
.workspace-scroll .nav-item span:last-child,
.workspace-scroll .nav-item > :not(.workspace-dot) { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* Workspace dot: 20px wide to match icon container, 4px radius, white Inter ExtraBold 10pt */
.workspace-dot { width:20px; height:18px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-family:'Inter', sans-serif; font-size:10px; font-weight:800; color:#fff; flex-shrink:0; letter-spacing:0; }

/* MAIN */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
/* Topbar: 84px tall, 32px L/R */
.topbar { display:flex; align-items:center; justify-content:space-between; padding:0 32px; height:84px; border-bottom:1px solid var(--border); flex-shrink:0; background:#fff; }
.topbar.no-border { border-bottom-color:transparent; }
.topbar-left { display:flex; align-items:center; gap:10px; }
.back-btn { background:none; border:none; cursor:pointer; color:var(--text-secondary); padding:8px; border-radius:8px; display:flex; align-items:center; transition:background 0.1s; }
.back-btn:hover { background:var(--nav-active-bg); }
/* Page title: 24pt Inter SemiBold */
.page-title { font-size:24px; font-weight:700; letter-spacing:0.1px; color:var(--text-active); }
/* Icons: 40px wide, 16px gap, avatar 40px */
.topbar-right { display:flex; align-items:center; gap:8px; }
.icon-btn { background:none; border:none; cursor:pointer; width:40px; height:40px; border-radius:8px; color:var(--text-secondary); display:flex; align-items:center; justify-content:center; transition:background 0.1s; position:relative; }
.icon-btn:hover { background:var(--nav-active-bg); }
.notif-dot { width:7px; height:7px; background:#ef4444; border-radius:50%; position:absolute; top:7px; right:7px; border:2px solid #fff; }
.avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,#6366f1,#a78bfa); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; cursor:pointer; }

/* CONTENT */
.content { flex:1; overflow-y:auto; display:flex; flex-direction:column; min-height:0; background:#F9FAFB; }
.content::-webkit-scrollbar { width:6px; }
.content::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:3px; }

/* PROFILE HEADER */
.profile-header { padding:0 32px 0; border-bottom:1px solid var(--border); background:#fff; flex-shrink:0; }
.profile-top { display:flex; align-items:center; gap:48px; padding:24px 0 48px; }
.profile-photo { width:148px; height:148px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:48px; font-weight:700; color:#fff; flex-shrink:0; border:2px solid #d8d0f0; overflow:hidden; }
.profile-info { display:flex; flex-direction:column; gap:0; }
.profile-name-row { display:flex; align-items:center; gap:24px; height:47px; }
.profile-name { font-size:28px; font-weight:700; letter-spacing:-0.3px; color:var(--text-active); }
.profile-meta { display:flex; flex-direction:column; gap:8px; }
.profile-meta-item { display:flex; align-items:center; gap:16px; font-size:16px; color:var(--text-secondary); font-weight:500; height:26px; }
.profile-meta-item svg { flex-shrink:0; width:16px; height:16px; }
.profile-meta-row { display:flex; align-items:center; height:26px; font-size:16px; color:var(--text-secondary); font-weight:500; }
.profile-meta-sep { padding:0 16px; color:var(--border); font-size:14px; }
.profile-meta-link { color:var(--accent); text-decoration:underline; cursor:pointer; }

/* TABS */
.tabs { display:flex; gap:12px; }
.tab { padding:0 20px 20px; height:auto; display:flex; align-items:flex-start; font-size:15px; font-weight:600; color:var(--text-secondary); cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-1px; transition:color 0.1s,border-color 0.1s; user-select:none; white-space:nowrap; }
.tab:hover { color:var(--text-active); }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }
.tabs-bar { border-bottom:1px solid var(--border); padding:24px 32px 0; background:#fff; flex-shrink:0; }
.tabs-bar .tabs { padding:0; }

/* TOOLBAR — 138px total: 48px top padding + 42px row + 48px bottom padding */
.toolbar { display:flex; align-items:center; justify-content:space-between; padding:32px 32px 32px; background:#F9FAFB; flex-shrink:0; gap:12px; overflow:visible; }
.filter-group { display:flex; gap:8px; flex-wrap:wrap; overflow:visible; }

/* PILLS */
.filter-pill { display:inline-flex; align-items:center; gap:8px; padding:0 8px 0 12px; height:44px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; user-select:none; background:#F9FAFB; border:1.5px solid #D8DEE5; color:var(--text-secondary); transition:background 0.12s, border-color 0.12s, color 0.12s; white-space:nowrap; position:relative; flex-wrap:nowrap; max-width:320px; }
.filter-pill.active { padding:0 8px 0 8px; }
.filter-pill:hover { background:#fff; border-color:#D8DEE5; color:var(--text-active); }
.filter-pill.active { background:#fff; border-color:#D8DEE5; color:var(--text-active); font-weight:600; }
.filter-pill.open { background:#fff; border-color:#D8DEE5; color:var(--text-active); }
.pill-label { flex-shrink:0; }
.pill-chips { display:inline-flex; align-items:center; gap:6px; flex-wrap:nowrap; overflow:hidden; min-width:0; }
.pill-chip { display:inline-flex; align-items:center; gap:6px; background:#F5F6F9; color:#4A5163; font-size:14px; font-weight:500; padding:0 4px 0 6px; border-radius:4px; height:32px; white-space:nowrap; flex-shrink:0; }
.pill-chip-x { display:flex; align-items:center; justify-content:center; width:16px; height:16px; cursor:pointer; transition:opacity 0.1s; color:#636C85; opacity:0.8; flex-shrink:0; }
.pill-chip-x:hover { opacity:1; }
.pill-chip-overflow { display:inline-flex; align-items:center; background:#F5F6F9; color:#4A5163; font-size:14px; font-weight:500; padding:0 10px; border-radius:6px; height:32px; white-space:nowrap; flex-shrink:0; }
.pill-chevron { display:flex; align-items:center; justify-content:center; width:20px; height:20px; flex-shrink:0; opacity:0.5; margin-left:8px; }

/* DROPDOWN */
.pill-dropdown { position:absolute; top:calc(100% + 6px); left:0; background:#fff; border:1px solid #D8DEE5; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,0.08); width:240px; z-index:300; display:none; overflow:hidden; padding:4px; }
.pill-dropdown.open { display:block; animation:fadeIn 0.1s ease; }
.pill-dd-header { display:none; }
.pill-dd-item { height:40px; padding:0 12px; font-size:14px; font-weight:500; color:#636C85; cursor:pointer; transition:background 0.1s,color 0.1s; display:flex; align-items:center; justify-content:space-between; gap:16px; white-space:nowrap; border-radius:4px; margin-bottom:4px; }
.pill-dd-item:last-child { margin-bottom:8; }
.pill-dd-item:hover { background:#EEF3FB; color:#323232; }
.pill-dd-item.selected { color:#323232; }
.pill-dd-item.selected:hover { background:#EEF3FB; }
.pill-dd-check { display:none; }
/* Circle checkmark */
.dd-circle { width:15px; height:15px; border-radius:50%; border:1.5px solid #C4C8D4; background:#fff; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:background 0.12s,border-color 0.12s; }
.pill-dd-item.selected .dd-circle { background:#36609E; border-color:#36609E; }
.pill-dd-item:hover:not(.selected) .dd-circle { border-color:#93AECF; }
.dd-circle svg { display:none; }
.pill-dd-item.selected .dd-circle svg { display:block; }

/* DATE PICKER */
/* ── DATE PICKER DROPDOWN ── */
.date-picker-dropdown { position:absolute; top:calc(100% + 8px); left:0; background:#fff; border:1.5px solid #e2e6ed; border-radius:16px; box-shadow:0 8px 32px rgba(30,40,80,0.13); z-index:400; display:none; padding:0; min-width:640px; overflow:hidden; font-family:inherit; }
.date-picker-dropdown.open { display:block; animation:fadeIn 0.12s ease; }
/* Calendar columns */
.dp-cal-wrap { display:flex; gap:0; padding:24px 28px 8px; }
.dp-cal-col { flex:1; min-width:0; }
.dp-cal-col+.dp-cal-col { border-left:1.5px solid #f0f2f6; padding-left:28px; margin-left:4px; }
/* Month header */
.dp-month-hdr { display:flex; align-items:center; justify-content:space-between; height:36px; margin-bottom:10px; }
.dp-month-nav { background:none; border:1.5px solid #e2e6ed; cursor:pointer; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#8492a6; transition:background 0.1s,border-color 0.1s; flex-shrink:0; }
.dp-month-nav:hover { background:#EEF3FB; border-color:#b8c5da; color:#36609E; }
.dp-month-name { font-size:14px; font-weight:700; color:#1e293b; letter-spacing:0.01em; }
/* Day-of-week row */
.dp-dow-row { display:grid; grid-template-columns:repeat(7,36px); height:26px; margin-bottom:4px; }
.dp-dow { width:36px; height:26px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#b0bac9; letter-spacing:0.04em; text-transform:uppercase; }
/* Day grid */
.dp-grid { display:grid; grid-template-columns:repeat(7,36px); row-gap:2px; }
.dp-day { width:36px; height:36px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:400; color:#374151; cursor:pointer; transition:background 0.07s,color 0.07s; user-select:none; position:relative; border-radius:50%; }
.dp-day:hover:not(.dp-empty):not(.dp-selected):not(.dp-range-start):not(.dp-range-end) { background:#EEF3FB; color:#36609E; border-radius:50%; }
.dp-day.dp-empty { cursor:default; }
.dp-day.dp-today { font-weight:700; color:#36609E; box-shadow:inset 0 0 0 1.5px #36609E; border-radius:50%; }
.dp-day.dp-selected,.dp-day.dp-range-start,.dp-day.dp-range-end { background:#36609E; color:#fff; border-radius:50%; font-weight:700; z-index:1; }
.dp-day.dp-range-start::after { content:''; position:absolute; top:0; right:0; width:50%; height:100%; background:#dbeafe; z-index:-1; border-radius:0; }
.dp-day.dp-range-end::before { content:''; position:absolute; top:0; left:0; width:50%; height:100%; background:#dbeafe; z-index:-1; border-radius:0; }
.dp-day.dp-in-range { background:#dbeafe; color:#36609E; border-radius:0; font-weight:500; }
.dp-day.dp-in-range.dp-week-start { border-radius:6px 0 0 6px; }
.dp-day.dp-in-range.dp-week-end { border-radius:0 6px 6px 0; }
/* Footer */
.dp-footer { display:flex; align-items:center; justify-content:space-between; padding:14px 28px 20px; border-top:1.5px solid #f0f2f6; margin-top:12px; gap:12px; }
.dp-range-label { display:flex; align-items:center; gap:8px; flex:1; }
.dp-range-chip { font-size:13px; font-weight:600; color:#b0bac9; padding:6px 14px; border-radius:8px; border:1.5px solid #e2e6ed; background:#f8fafc; min-width:110px; text-align:center; transition:color 0.15s,border-color 0.15s; }
.dp-range-chip.set { color:#1e293b; border-color:#93c5fd; background:#eff6ff; }
.dp-footer-btns { display:flex; gap:8px; flex-shrink:0; }
.dp-clear { background:#fff; border:1.5px solid #e2e6ed; font-size:13px; font-weight:600; color:#8492a6; cursor:pointer; padding:0 20px; height:40px; border-radius:8px; transition:all 0.1s; font-family:inherit; }
.dp-clear:hover { background:#f1f5f9; color:#374151; border-color:#b8c5da; }
.dp-apply { background:#e2e8f0; color:#94a3b8; border:none; font-size:13px; font-weight:700; padding:0 24px; height:40px; border-radius:8px; cursor:pointer; transition:all 0.15s; font-family:inherit; }
.dp-apply.ready { background:#36609E; color:#fff; }
.dp-apply.ready:hover { background:#36609E; }

/* VIEW TOGGLE */
.view-toggle { display:flex; border-radius:8px; background:#FDFDFD; border:1px solid #EEF2F6; padding:0px; gap:0px; height:44px; box-sizing:border-box; align-items:center; }
.view-btn { width:44px; height:44px; background:transparent; border:none; cursor:pointer; color:#ACB1BF; display:flex; align-items:center; justify-content:center; transition:color 0.12s; flex-shrink:0; border-radius:8px; }
.view-btn.active { background:#fff; color:#4A5163; border:1px solid #EEF2F6; }
.view-btn:hover:not(.active) { color:#636C85; background:transparent; }

.toolbar-right { display:flex; align-items:center; gap:16px; flex-shrink:0; }
.btn-primary { display:flex; align-items:center; gap:12px; padding:0 20px 0 16px; height:44px; background:var(--btn-primary); color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; transition:background 0.12s; white-space:nowrap; font-family:inherit; }
.btn-primary:hover { background:var(--btn-primary-hover); }

/* TABLE */
.table-container { flex:1; overflow-y:auto; background:#F9FAFB; }
.table-container::-webkit-scrollbar { width:5px; }
.table-container::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:3px; }
table { width:100%; border-collapse:separate; border-spacing:0 0; padding:0 32px 16px; table-layout:fixed; }
thead th { padding:0 14px; height:34px; text-align:left; font-size:14px; font-weight:700; color:var(--text-primary); background:#F9FAFB; position:sticky; top:0; z-index:2; cursor:pointer; user-select:none; white-space:nowrap; overflow:visible; text-overflow:ellipsis; transition:color 0.1s; display:table-cell; vertical-align:middle; border-bottom:none; box-shadow:0 1px 0 0 #F9FAFB; }
thead th::before { content:''; position:absolute; inset:0 -2px; background:#F9FAFB; z-index:-1; }
thead tr { border-bottom:none; box-shadow:none; }
thead th:hover { color:var(--text-active); }
thead th.sorted { color:var(--text-active); }
thead th .sort-arrow { display:inline-flex; align-items:center; vertical-align:middle; margin-left:4px; opacity:0; transition:opacity 0.1s; line-height:1; padding-bottom:2px; }
thead th:hover .sort-arrow { opacity:0.5; }
thead th.sorted .sort-arrow { opacity:1; }
th:first-child, td:first-child { padding-left:16px; }
th:last-child, td:last-child { padding-right:16px; }
/* Card rows: #FDFDFD default, #ffffff on hover/select, 8px radius */
tbody tr { background:transparent; cursor:pointer; transition:box-shadow 0.12s; height:72px; }
tbody tr td { border-top:none; background:#FDFDFD; box-shadow:0 0 0 1px #EEF2F6; }
tbody tr td:not(:first-child) { box-shadow:inset 0 1px 0 0 #EEF2F6, inset 0 -1px 0 0 #EEF2F6, 1px 0 0 0 #EEF2F6; }
tbody tr td:first-child { box-shadow:-1px 0 0 0 #EEF2F6, inset 0 1px 0 0 #EEF2F6, inset 0 -1px 0 0 #EEF2F6; }
tbody tr td:last-child { box-shadow:inset 0 1px 0 0 #EEF2F6, inset 0 -1px 0 0 #EEF2F6, 1px 0 0 0 #EEF2F6; }
tbody tr:hover td { background:#ffffff; color:var(--text-active); }
tbody tr:hover td:first-child { box-shadow:-1px 0 0 0 #DFDFED, inset 0 1px 0 0 #DFDFED, inset 0 -1px 0 0 #DFDFED; }
tbody tr:hover td:not(:first-child):not(:last-child) { box-shadow:inset 0 1px 0 0 #DFDFED, inset 0 -1px 0 0 #DFDFED; }
tbody tr:hover td:last-child { box-shadow:1px 0 0 0 #DFDFED, inset 0 1px 0 0 #DFDFED, inset 0 -1px 0 0 #DFDFED; }
tbody tr:hover .doc-name { color:var(--text-active); }
tbody tr:hover .row-actions { opacity:1 !important; }
tbody tr .row-actions.has-star-active { opacity:1; }
tbody tr .row-actions .star-btn.starred { opacity:1; }
/* Row gap via spacer rows */
tbody tr.spacer { height:4px !important; max-height:4px !important; background:transparent; box-shadow:none; pointer-events:none; }
tbody tr.spacer td { padding:0; border:none; background:transparent; box-shadow:none !important; height:4px !important; }
td { padding:0 15px; font-size:15px; font-weight:500; vertical-align:middle; color:var(--text-primary); overflow:hidden; max-width:0; }
/* 4px radius on ALL corners of each row via first/last td */
tbody tr td:first-child { border-radius:8px 0 0 8px; }
tbody tr td:last-child { border-radius:0 8px 8px 0; }
/* Actions cell: zero padding — buttons are 40px, more-btn has 16px right margin to land icon 16px from row edge */
td.actions-cell { padding:0; overflow:visible; }
/* Doc name truncation */
td .doc-name { font-weight:700; font-size:15px; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; letter-spacing:0.01em; }
/* Owner and date */
.owner-cell, .date-cell { color:var(--text-primary); font-size:15px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.date-cell { white-space:nowrap; }
/* doc-cell: flex but must allow name to truncate */
.doc-cell { display:flex; align-items:center; gap:16px; min-width:0; overflow:hidden; }
/* owner-wrap: flex with truncatable text */
.owner-wrap { display:flex; align-items:center; gap:12px; min-width:0; overflow:hidden; white-space:nowrap; }
.owner-wrap span, .owner-wrap > *:not(.mini-avatar) { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; }
/* Keep row in active state while ctx menu is open */
tbody tr.ctx-open td:first-child { box-shadow:-1px 0 0 0 #DFDFED, inset 0 1px 0 0 #DFDFED, inset 0 -1px 0 0 #DFDFED; }
tbody tr.ctx-open td:not(:first-child):not(:last-child) { box-shadow:inset 0 1px 0 0 #DFDFED, inset 0 -1px 0 0 #DFDFED; }
tbody tr.ctx-open td:last-child { box-shadow:1px 0 0 0 #DFDFED, inset 0 1px 0 0 #DFDFED, inset 0 -1px 0 0 #DFDFED; }
tbody tr.ctx-open td { background:#ffffff; }
tbody tr.ctx-open .row-actions { opacity:1 !important; }
tbody tr.ctx-open td { color:var(--text-active); }
tbody tr.ctx-open .doc-name { color:var(--text-active); }
tbody tr.ctx-open .more-btn svg path { fill:#323232; }
.owner-wrap { display:flex; align-items:center; gap:12px; }
/* Doc cell */
.doc-cell { display:flex; align-items:center; gap:16px; }
.doc-icon { width:40px; height:40px; background:none; border-radius:4px; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; }
.empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#F9FAFB; min-height:300px; gap:16px; }
.empty-state-caption { font-size:16px; font-weight:500; color:var(--text-secondary); }
.team-icon { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; }
.team-icon svg, .ws-icon-cell svg, .proj-icon svg { display:block; }
.mini-avatar { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:#fff; flex-shrink:0; }.row-actions { display:flex; align-items:center; justify-content:flex-end; gap:0; opacity:0; transition:opacity 0.1s; }
.star-btn, .more-btn { background:none; border:none; cursor:pointer; width:40px; height:40px; border-radius:6px; display:flex; align-items:center; justify-content:center; transition:background 0.1s; flex-shrink:0; }
.star-btn:hover, .more-btn:hover { background:#F5F6F9; }
.more-btn { margin-right:16px; }
.star-btn:hover svg .star-path { stroke:#323232; }
.star-btn.starred svg .star-path { fill:#323232; stroke:#323232; }
.more-btn:hover svg path { fill:#323232; }
/* Role and access tags: keep semantic colors but inherit on hover */
.role-col { padding-right:28px; }
.role-tag { display:inline-flex; align-items:center; gap:12px; padding:8px 16px 8px 8px; border-radius:20px; font-size:14px; font-weight:600; white-space:nowrap; height:36px; box-sizing:border-box; }
.role-tag-icon { width:18px; height:18px; flex-shrink:0; }
.role-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.access-tag { display:inline-flex; align-items:center; padding:8px 16px; border-radius:20px; font-size:14px; font-weight:600; white-space:nowrap; height:36px; box-sizing:border-box; }
.ws-icon-cell { width:40px; height:40px; border-radius:6px; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; }

/* GRID */
.grid-view { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; padding:32px 32px 24px; }
.grid-card { background:#FDFDFD; border-radius:12px; box-shadow:0 0 0 1px #EEF2F6; cursor:pointer; transition:box-shadow 0.15s, background 0.15s; overflow:hidden; display:flex; flex-direction:column; }
.grid-card:hover { background:#ffffff; box-shadow:0 0 0 1px #DFDFED; }
.gc-top { padding:16px 16px 0; display:flex; align-items:flex-start; justify-content:space-between; position:relative; }
.gc-icon-wrap { width:56px; height:56px; border-radius:10px; background:#f3f4f6; display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; }
.gc-icon-wrap.circle { background:none; border-radius:0; overflow:visible; }
.gc-icon-wrap > svg, .gc-icon-wrap > div { flex-shrink:0; }
.gc-role-badge { flex-shrink:0; margin-left:8px; }
.gc-role-badge .role-tag { height:26px; font-size:12px; padding:0 8px 0 6px; gap:4px; border-radius:13px; }
.gc-role-badge .role-tag-icon, .gc-role-badge .role-tag svg { width:16px; height:16px; }
.gc-body { padding:16px 16px 8px; flex:1; }
.gc-title { font-size:15px; font-weight:600; line-height:1.45; color:#323232; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:8px; font-family:inherit; letter-spacing:0.01em; }
.gc-meta { font-size:14px; font-weight:500; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.gc-divider { height:1px; background:#F2F5F8; margin:0 16px; }
.gc-footer { height:57px; padding:0 16px; display:flex; align-items:center; justify-content:space-between; }
.gc-footer-left { display:flex; align-items:center; gap:10px; flex:1; min-width:0; overflow:hidden; }
.gc-date { font-size:14px; font-weight:500; color:var(--text-secondary); white-space:nowrap; }
.gc-actions { display:flex; align-items:center; gap:2px; opacity:0; transition:opacity 0.1s; flex-shrink:0; }
.grid-card:hover .gc-actions, .gc-actions.star-active { opacity:1; }
.gc-star-btn, .gc-more-btn { width:32px; height:32px; display:flex; align-items:center; justify-content:center; border:none; background:none; cursor:pointer; border-radius:6px; transition:background 0.1s; padding:0; }
.gc-star-btn:hover, .gc-more-btn:hover { background:#F5F6F9; }
.gc-footer .role-tag { display:none; }

/* CTX MENU */
.ctx-menu { position:fixed; background:#fff; border:1px solid var(--border); border-radius:9px; box-shadow:var(--shadow-md); width:170px; z-index:999; padding:5px 0; display:none; }
.ctx-menu.visible { display:block; animation:fadeIn 0.1s ease; }
.ctx-item { display:flex; align-items:center; gap:10px; padding:0 12px; height:40px; font-size:14px; font-weight:600; color:var(--text-primary); cursor:pointer; transition:background 0.1s,color 0.1s; user-select:none; border-radius:6px; margin:0 5px; }
.ctx-item:hover { background:var(--nav-active-bg); color:var(--text-active); }
.ctx-icon { width:20px; height:20px; display:flex; align-items:center; justify-content:center; flex-shrink:0; opacity:0.5; }
.ctx-item:hover .ctx-icon { opacity:0.85; }
.ctx-item.danger { color:#dc2626; }
.ctx-item.danger .ctx-icon { opacity:0.7; }
.ctx-item.danger:hover { background:var(--nav-active-bg); color:#b91c1c; }
.ctx-divider { height:1px; background:var(--border); margin:4px 5px; }

/* MODAL */
.modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.32); z-index:500; display:none; align-items:center; justify-content:center; }
.modal-backdrop.visible { display:flex; animation:fadeIn 0.15s; }
.modal { background:#fff; border-radius:14px; width:450px; padding:28px; box-shadow:0 20px 60px rgba(0,0,0,0.18); animation:slideUp 0.18s ease; }
.modal-title { font-size:15px; font-weight:700; margin-bottom:18px; }
.modal-label { font-size:12px; font-weight:600; color:var(--text-secondary); margin-bottom:5px; display:block; }
.modal-input { width:100%; padding:8px 11px; border:1px solid var(--border); border-radius:7px; font-size:13.5px; font-family:inherit; outline:none; margin-bottom:15px; color:var(--text-primary); transition:border-color 0.12s; }
.modal-input:focus { border-color:var(--accent); }
.doc-type-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:20px; }
.doc-type-option { border:2px solid var(--border); border-radius:9px; padding:12px 11px; cursor:pointer; transition:border-color 0.12s,background 0.12s; }
.doc-type-option:hover { border-color:#93c5fd; background:var(--accent-light); }
.doc-type-option.selected { border-color:var(--accent); background:var(--accent-light); }
.doc-type-label { font-size:13px; font-weight:600; margin-top:5px; }
.doc-type-desc { font-size:11.5px; color:var(--text-muted); margin-top:2px; }
.modal-footer { display:flex; justify-content:flex-end; gap:9px; margin-top:4px; }
.btn-cancel { padding:7px 15px; border:1px solid var(--border); border-radius:7px; background:#fff; font-size:13px; font-weight:500; cursor:pointer; color:var(--text-secondary); font-family:inherit; transition:background 0.1s; }
.btn-cancel:hover { background:var(--row-hover); }

.hidden { display:none !important; }

@keyframes fadeIn { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>

// ── SIDEBAR ──
function initSidebar(){
  document.getElementById('workspace-list').innerHTML=WORKSPACES.map(w=>`
    <div class="nav-item" id="ws-${w.id}" onclick="navWS('${w.id}')">
      <span class="workspace-dot" style="background:${w.color}">${w.label.substring(0,2)}</span>${w.label}
    </div>`).join('');
}

function setNav(id){
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById(id); if(el)el.classList.add('active');
}

function navigate(v){
  S.prevView=S.view; S.view=v; S.workspace=null; S.filters={};
  applyDefaultSort(v);
  setNav('nav-'+v); render();
}
function navWS(id){
  S.prevView=S.view; S.view='workspace'; S.workspace=id; S.filters={};
  applyDefaultSort('workspace');
  setNav('ws-'+id); render();
}
function handleBack(){
  if(S.view==='admin-account'){ S.view='admin'; S.filters={}; setNav('nav-admin'); render(); }
  else navigate(S.prevView||'recent');
}

// ── RENDER ──
function renderRows(){
  // Refresh table rows only — find the table-container and update it
  const tableContainer=document.querySelector('.table-container');
  if(!tableContainer) return;
  // Re-run the current view's row generation
  // We need to get the current rows based on view and filters
  let allRows=[], prefix='', cols=[], sorted='';
  if(S.view==='recent'||S.view==='favorites'){
    allRows = S.view==='recent' ? RECENT_DOCS.map((d,i)=>({...d,_i:i}))
      : RECENT_DOCS.map((d,i)=>({...d,_origIdx:i,_i:i})).filter(d=>S.starred.has('rec-'+d._i));
    prefix='rec'; cols=['Name','Owner','Last Modified']; sorted='Last Modified';
  } else if(S.view==='shared'){
    allRows=SHARED_DOCS.map((d,i)=>({...d,_i:i})); prefix='sh'; cols=['Name','Owner','Shared On']; sorted='Shared On';
  } else { render(); return; }

  const colMap={'Name':'name','Owner':'owner','Last Modified':'date','Shared On':'date'};
  const filtered=applyF(allRows,{owner:S.filters.owner}).filter(r=>{
    const sk='ds_lastmod',ek='de_lastmod';
    if(!S.filters[sk]&&!S.filters[ek]) return true;
    const d=new Date(r.date); d.setHours(0,0,0,0);
    const rk=dpKey(d.getFullYear(),d.getMonth(),d.getDate());
    if(S.filters[sk]&&rk<S.filters[sk]) return false;
    if(S.filters[ek]&&rk>S.filters[ek]) return false;
    return true;
  });
  const sortedRows=sortRows(filtered,colMap);
  const tbody=tableContainer.querySelector('tbody');
  if(!tbody) return;
  tbody.innerHTML=sortedRows.length ? sortedRows.map(d=>{
    const ac=ownerColor(d.owner);
    return`<tr class="spacer"><td colspan="4"></td></tr><tr><td><div class="doc-cell"><div class="doc-icon">${fileIcon()}</div><span class="doc-name">${d.name}</span></div></td>
    <td class="owner-cell"><div class="owner-wrap"><div class="mini-avatar" style="background:${ac}">${ini(d.owner)}</div><span>${d.owner}</span></div></td>
    <td class="date-cell">${d.date}</td>${rowActions(prefix,d._i)}</tr>`;
  }).join('') : `<tr><td colspan="4"><div class="empty-state">${EMPTY_SVG}<span class="empty-state-caption">Nothing to see here....yet!</span></div></td></tr>`;
  // re-bind row hover
  tbody.querySelectorAll('tr').forEach(tr=>{
    const ra=tr.querySelector('.row-actions'); if(!ra)return;
    tr.addEventListener('mouseenter',()=>ra.style.opacity='1');
    tr.addEventListener('mouseleave',()=>ra.style.opacity='0');
  });
}

function render(){
  const content=document.getElementById('main-content');
  const titleEl=document.getElementById('page-title');
  const backBtn=document.getElementById('back-btn');
  backBtn.classList.add('hidden');

  const hasTabs = ['workspace','admin','admin-account'].includes(S.view);
  document.querySelector('.topbar').classList.toggle('no-border', hasTabs);

  if(S.view==='recent'){ titleEl.textContent='Recent'; content.innerHTML=docPage(RECENT_DOCS,'rec',['Name','Owner','Last Modified'],'Last Modified',false); }
  else if(S.view==='favorites'){
    titleEl.textContent='Favorites';
    const favDocs=RECENT_DOCS.map((d,i)=>({...d,_origIdx:i})).filter(d=>S.starred.has('rec-'+d._origIdx));
    content.innerHTML=docPageWithIdx(favDocs,'rec',['Name','Owner','Last Modified'],'Last Modified',false);
  }
  else if(S.view==='shared'){ titleEl.textContent='Shared'; content.innerHTML=docPage(SHARED_DOCS,'sh',['Name','Owner','Shared On'],'Shared On',false); }
  else if(S.view==='workspace'){ const ws=WORKSPACES.find(w=>w.id===S.workspace); titleEl.textContent=ws?ws.label:''; content.innerHTML=wsPage(ws); }
  else if(S.view==='admin'){ titleEl.textContent='Admin'; content.innerHTML=adminPage(); }
  else if(S.view==='admin-account'){ titleEl.textContent='Admin'; backBtn.classList.remove('hidden'); content.innerHTML=accountProfilePage(); }

  // re-bind hover
  document.querySelectorAll('tbody tr').forEach(tr=>{
    const ra=tr.querySelector('.row-actions'); if(!ra)return;
    tr.addEventListener('mouseenter',()=>ra.style.opacity='1');
    tr.addEventListener('mouseleave',()=>ra.style.opacity='0');
  });
}

// ── HELPERS ──
function ownerColor(n){const p=['#36609E','#7c3aed','#0891b2','#059669','#b45309','#be123c','#9333ea','#c2410c','#0f766e','#15803d'];let h=0;for(const c of n)h=(h*31+c.charCodeAt(0))%p.length;return p[h];}
function ini(n){return n.split(' ').slice(0,2).map(s=>s[0]).join('');}
function sortArrow(col){
  const isSorted = S.sortCol === col;
  const isAsc = S.sortDir === 'asc';
  const up = `<line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>`;
  const down = `<line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>`;
  return `<span class="sort-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">${isSorted && isAsc ? up : down}</svg></span>`;
}
function thClass(col){ return S.sortCol===col ? 'sorted' : ''; }
function toggleSort(col){ if(S.sortCol===col){S.sortDir=S.sortDir==='asc'?'desc':'asc';}else{S.sortCol=col;S.sortDir='asc';} render(); }

function sortRows(rows, colMap){
  if(!S.sortCol || !colMap[S.sortCol]) return rows;
  const key = colMap[S.sortCol];
  return [...rows].sort((a,b)=>{
    const av = (a[key]||'').toLowerCase();
    const bv = (b[key]||'').toLowerCase();
    const cmp = av.localeCompare(bv);
    return S.sortDir === 'asc' ? cmp : -cmp;
  });
}

// ── DATE PICKER ──
const DP = (function(){
  const now = new Date();
  return { viewYear:now.getFullYear(), viewMonth:now.getMonth(), hoverDay:null, preset:null, activeKey:null };
})();
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Su','Mo','Tu','We','Th','Fr','Sa'];

function dpParseDate(str){ // "Nov 3, 2022" → Date
  if(!str) return null;
  const d = new Date(str);
  return isNaN(d)?null:d;
}
function dpFmt(d){ // Date → "Mon D, YYYY"
  if(!d) return '';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function dpKey(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function dpFromKey(k){ const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); }

function dpBuildMonth(year, month, cells){
  const dows = DAYS.map(d=>`<div class="dp-dow">${d}</div>`).join('');
  return`<div class="dp-month">
    <div class="dp-month-header">
      <div class="dp-month-name">${MONTHS[month]} ${year}</div>
    </div>
    <div class="dp-grid">${dows}${cells}</div>
  </div>`;
}

// Active date-pill key for the open calendar
function dpSK(){ return 'ds_'+(DP.activeKey||'default'); }
function dpEK(){ return 'de_'+(DP.activeKey||'default'); }

function dpBuildCal(key){
  const sk='ds_'+key, ek='de_'+key;
  const start=S.filters[sk]||null, end=S.filters[ek]||null, hover=DP.hoverDay;
  const y1=DP.viewYear, m1=DP.viewMonth;
  const y2=m1===11?y1+1:y1, m2=m1===11?0:m1+1;
  const dows=DAYS.map(d=>`<div class="dp-dow">${d}</div>`).join('');
  const nav=(dir,unit)=>`<button class="dp-month-nav" onclick="dpNav(${dir},'${unit}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="${dir<0?'15 18 9 12 15 6':'9 18 15 12 9 6'}"/></svg></button>`;

  // Range label strip
  let rangeLabel='';
  if(start||end){
    const s=start?dpFmt(dpFromKey(start)):'…';
    const e=end?dpFmt(dpFromKey(end)):'…';
    rangeLabel=`<div class="dp-range-label"><span class="dp-range-chip ${start?'set':''}">${s}</span><svg width="16" height="8" viewBox="0 0 16 8"><line x1="0" y1="4" x2="16" y2="4" stroke="#cbd5e1" stroke-width="1.5"/></svg><span class="dp-range-chip ${end?'set':''}">${e}</span></div>`;
  }

  const cal=`<div class="dp-cal-wrap">
    <div class="dp-cal-col">
      <div class="dp-month-hdr">
        <div style="display:flex;gap:4px">${nav(-1,'year')}${nav(-1,'month')}</div>
        <span class="dp-month-name">${MONTHS[m1]} ${y1}</span>
        <div style="width:72px"></div>
      </div>
      <div class="dp-dow-row">${dows}</div>
      <div class="dp-grid">${dpMonthCells(y1,m1,start,end,hover)}</div>
    </div>
    <div class="dp-cal-col">
      <div class="dp-month-hdr">
        <div style="width:72px"></div>
        <span class="dp-month-name">${MONTHS[m2]} ${y2}</span>
        <div style="display:flex;gap:4px">${nav(1,'month')}${nav(1,'year')}</div>
      </div>
      <div class="dp-dow-row">${dows}</div>
      <div class="dp-grid">${dpMonthCells(y2,m2,start,end,hover)}</div>
    </div>
  </div>`;
  const ready=!!(start&&end);
  const footer=`<div class="dp-footer">
    ${rangeLabel}
    <div class="dp-footer-btns">
      <button class="dp-clear" onclick="dpClear()">Clear</button>
      <button class="dp-apply${ready?' ready':''}" onclick="dpApply()">OK</button>
    </div>
  </div>`;
  return cal+footer;
}

function dpRenderKeyed(key){
  const el=document.getElementById('dp-calendar-'+key);
  if(!el) return;
  el.innerHTML=dpBuildCal(key);
}

// dpRender refreshes whichever calendar is currently open
function dpRender(){
  if(DP.activeKey) dpRenderKeyed(DP.activeKey);
}

function dpMonthCells(year, month, startKey, endKey, hoverKey){
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  const todayKey = dpKey(today.getFullYear(), today.getMonth(), today.getDate());
  let cells='';
  for(let i=0;i<firstDay;i++) cells+=`<div class="dp-day dp-empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const k=dpKey(year,month,d);
    const dow=new Date(year,month,d).getDay();
    const effectiveEnd=endKey||(hoverKey&&startKey&&!endKey&&hoverKey>startKey?hoverKey:null);
    let cls='dp-day';
    if(k===startKey&&k===endKey) cls+=' dp-selected';
    else if(k===startKey) cls+=effectiveEnd?' dp-range-start':' dp-selected';
    else if(k===endKey) cls+=' dp-range-end';
    else if(startKey&&effectiveEnd&&k>startKey&&k<effectiveEnd){
      cls+=' dp-in-range';
      if(dow===0) cls+=' dp-week-start';
      if(dow===6) cls+=' dp-week-end';
    }
    if(k===todayKey) cls+=' dp-today';
    cells+=`<div class="${cls}" data-key="${k}" onclick="dpDayClick('${k}')" onmouseenter="dpHover('${k}')">${d}</div>`;
  }
  return cells;
}

function dpDayClick(k){
  DP.preset=null;
  if(!S.filters[dpSK()]||S.filters[dpEK()]){
    S.filters[dpSK()]=k; delete S.filters[dpEK()]; DP.hoverDay=null;
  } else {
    if(k<S.filters[dpSK()]){ S.filters[dpEK()]=S.filters[dpSK()]; S.filters[dpSK()]=k; }
    else S.filters[dpEK()]=k;
  }
  dpRender();
}
function dpHover(k){ DP.hoverDay=k; dpRender(); }
function dpNav(dir, unit){
  if(unit==='year') DP.viewYear+=dir;
  else {
    DP.viewMonth+=dir;
    if(DP.viewMonth>11){DP.viewMonth=0;DP.viewYear++;}
    if(DP.viewMonth<0){DP.viewMonth=11;DP.viewYear--;}
  }
  dpRender();
}
function dpClear(){ delete S.filters[dpSK()]; delete S.filters[dpEK()]; DP.hoverDay=null; DP.preset=null; dpRender(); }
function dpApply(){ closeAllPills(); render(); }


function datePill(key, label){
  const sk='ds_'+key, ek='de_'+key;
  const start = S.filters[sk];
  const end   = S.filters[ek];
  const active = !!(start||end);
  let disp = label;
  if(start&&end) disp=`${dpFmt(dpFromKey(start))} – ${dpFmt(dpFromKey(end))}`;
  else if(start) disp=`From ${dpFmt(dpFromKey(start))}`;
  return`<div class="filter-pill ${active?'active':''}" id="pill-${key}" onclick="pillClick(event,'${key}',true)">
    <span style="overflow:hidden;text-overflow:ellipsis;min-width:0">${disp}</span><span class="pill-chevron"><svg width="8" height="5" viewBox="6 9 12 6" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></span>
    <div class="pill-dropdown date-picker-dropdown" id="dd-${key}" onclick="event.stopPropagation()" style="min-width:620px">
      <div id="dp-calendar-${key}"></div>
    </div>
  </div>`;
}

// Portal dropdown registry: key -> {opts, label}
const PILL_OPTS = {};

function pill(key,label,opts){
  PILL_OPTS[key] = {opts, label};
  const active=S.filters[key];
  const sel = active instanceof Set ? active : new Set();
  const isActive = sel.size > 0;
  const xSvg=`<svg width="8" height="8" viewBox="0 0 8 8" fill="none"><line x1="1" y1="1" x2="7" y2="7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="7" y1="1" x2="1" y2="7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>`;
  let labelPart;
  if(isActive){
    const allVals=[...sel];
    const PILL_USABLE=200, overflowBadgeW=36;
    let shown=[], overflow=0, used=0;
    for(let i=0;i<allVals.length;i++){
      const approxW=allVals[i].length*7.5+38;
      const remaining=allVals.length-i-1;
      const budgetNeeded=approxW+(remaining>0?overflowBadgeW+4:0);
      if(used+budgetNeeded<=PILL_USABLE||shown.length===0){ shown.push(allVals[i]); used+=approxW+4; }
      else { overflow=allVals.length-shown.length; break; }
    }
    const chipHtml=shown.map(v=>`<span class="pill-chip">${v}<span class="pill-chip-x" onclick="removeChip(event,'${key}','${v}')">${xSvg}</span></span>`).join('');
    const badgeHtml=overflow>0?`<span class="pill-chip-overflow">+${overflow}</span>`:'';
    labelPart=`<span class="pill-chips" id="chips-${key}">${chipHtml}${badgeHtml}</span>`;
  } else {
    labelPart=`<span class="pill-label">${label}</span>`;
  }
  const chevronSvg=`<svg width="8" height="5" viewBox="6 9 12 6" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>`;
  return`<div class="filter-pill ${isActive?'active':''}" id="pill-${key}" data-label="${label}" onclick="pillClick(event,'${key}')">
    ${labelPart}<span class="pill-chevron">${chevronSvg}</span>
  </div>`;
}

function pillBuildPortal(key){
  const {opts} = PILL_OPTS[key]||{opts:[]};
  const sel = S.filters[key] instanceof Set ? S.filters[key] : new Set();
  const checkSvg=`<svg width="7" height="6" viewBox="0 0 10 8" fill="none"><polyline points="1 4 4 7 9 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const items=opts.map(o=>`<div class="pill-dd-item ${sel.has(o)?'selected':''}" data-val="${o}" data-key="${key}" onclick="toggleFilter(event,'${key}','${o}')"><span>${o}</span><span class="dd-circle">${checkSvg}</span></div>`);
  let el=document.getElementById('dd-'+key);
  if(!el){
    el=document.createElement('div');
    el.id='dd-'+key;
    el.className='pill-dropdown';
    el.setAttribute('onclick','event.stopPropagation()');
    document.body.appendChild(el);
  }
  el.innerHTML=items.join('');
  return el;
}

function pillClick(e,key,isDate=false){
  e.stopPropagation();
  const p=document.getElementById('pill-'+key);
  const wasOpen = document.getElementById('dd-'+key)?.classList.contains('open');
  closeAllPills();
  if(!wasOpen){
    if(isDate){
      // date picker still inline
      const dd=document.getElementById('dd-'+key);
      if(dd){ dd.classList.add('open'); p && p.classList.add('open'); }
      DP.activeKey=key; DP.hoverDay=null;
      const sk='ds_'+key;
      if(S.filters[sk]){ DP.viewYear=parseInt(S.filters[sk].split('-')[0]); DP.viewMonth=parseInt(S.filters[sk].split('-')[1])-1; }
      else { const now=new Date(); DP.viewYear=now.getFullYear(); DP.viewMonth=now.getMonth(); }
      dpRenderKeyed(key);
    } else {
      const dd=pillBuildPortal(key);
      // Position portal below the pill
      const rect=p.getBoundingClientRect();
      dd.style.position='fixed';
      dd.style.top=(rect.bottom+6)+'px';
      dd.style.left=rect.left+'px';
      dd.style.zIndex='9999';
      dd.classList.add('open');
      p && p.classList.add('open');
    }
  }
}

function closeAllPills(){
  document.querySelectorAll('.pill-dropdown').forEach(d=>d.classList.remove('open'));
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('open'));
}
function setFilter(e,key,val){
  e.stopPropagation();
  if(val===null||val==='null')delete S.filters[key]; else S.filters[key]=val;
  closeAllPills(); render();
}
function toggleFilter(e,key,val){
  e.stopPropagation();
  if(!S.filters[key]||!(S.filters[key] instanceof Set)) S.filters[key]=new Set();
  const s=S.filters[key];
  s.has(val)?s.delete(val):s.add(val);
  if(s.size===0) delete S.filters[key];
  rebuildPillChips(key);
  renderRows();
}

function removeChip(e,key,val){
  e.stopPropagation();
  if(S.filters[key] instanceof Set){
    S.filters[key].delete(val);
    if(S.filters[key].size===0) delete S.filters[key];
  }
  rebuildPillChips(key);
  renderRows();
}

function rebuildPillChips(key){
  const pillEl=document.getElementById('pill-'+key);
  if(!pillEl) return;
  const s=S.filters[key];
  const sel = s instanceof Set ? s : new Set();
  const isActive = sel.size>0;
  const origLabel=pillEl.dataset.label||(key.charAt(0).toUpperCase()+key.slice(1));
  const xSvg=`<svg width="8" height="8" viewBox="0 0 8 8" fill="none"><line x1="1" y1="1" x2="7" y2="7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="7" y1="1" x2="1" y2="7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>`;

  const chevron=pillEl.querySelector('.pill-chevron');
  pillEl.querySelectorAll('.pill-label,.pill-chips').forEach(el=>el.remove());

  if(isActive){
    const allVals=[...sel];
    // Measure how many chips fit: pill max-width 320px, minus 16px left pad, 12px right, 20px chevron, 8px margin, 8px gap = ~256px usable
    // Estimate chip width: ~8px per char + 8+4+18px padding+x = ~38px base + char width
    // Use a simple approach: show up to 2 chips, then +N for rest
    const PILL_USABLE = 200; // conservative px budget for chips area
    const overflowBadgeW = 36;
    let shown=[], overflow=0;
    let used=0;
    for(let i=0;i<allVals.length;i++){
      const approxW = allVals[i].length*7.5 + 38;
      const remaining = allVals.length - i - 1;
      const needBadge = remaining > 0;
      const budgetNeeded = approxW + (needBadge ? overflowBadgeW+4 : 0);
      if(used + budgetNeeded <= PILL_USABLE || shown.length===0){
        shown.push(allVals[i]);
        used += approxW + 4;
      } else {
        overflow = allVals.length - shown.length;
        break;
      }
    }
    const chipHtml = shown.map(v=>`<span class="pill-chip">${v}<span class="pill-chip-x" onclick="removeChip(event,'${key}','${v}')">${xSvg}</span></span>`).join('');
    const badgeHtml = overflow>0 ? `<span class="pill-chip-overflow">+${overflow}</span>` : '';
    const frag=document.createElement('span');
    frag.className='pill-chips';
    frag.id='chips-'+key;
    frag.innerHTML=chipHtml+badgeHtml;
    pillEl.insertBefore(frag, chevron);
  } else {
    const lbl=document.createElement('span');
    lbl.className='pill-label';
    lbl.textContent=origLabel;
    pillEl.insertBefore(lbl, chevron);
  }
  pillEl.classList.toggle('active', isActive);

  // Update checkboxes in portal dropdown
  const ddEl=document.getElementById('dd-'+key);
  if(ddEl){ ddEl.querySelectorAll('.pill-dd-item').forEach(item=>{ item.classList.toggle('selected', sel.has(item.dataset.val)); }); }
}

function applyF(rows,map){
  return rows.filter(r=>{
    for(const[k,v]of Object.entries(map)){
      if(!v)continue;
      if(v instanceof Set){
        if(v.size===0)continue;
        const rv=(r[k]||'').toLowerCase();
        const match=[...v].some(sv=>rv.includes(sv.toLowerCase()));
        if(!match)return false;
      } else {
        const rv=(r[k]||'').toLowerCase();
        if(!rv.includes(v.toLowerCase()))return false;
      }
    }
    return true;
  });
}

// ── SHARED BUILDERS ──
function toolbar(pills,btn=''){
  return`<div class="toolbar"><div class="filter-group">${Array.isArray(pills)?pills.join(''):pills}</div><div class="toolbar-right">${vtoggle()}${btn}</div></div>`;
}
function tableWrap(headers,rows,empty,colWidths){
  // Count columns for spacer colspan
  const colCount=(headers.match(/<th/g)||[]).length;
  // Build colgroup if widths provided, else equal distribution
  let cg='';
  if(colWidths&&colWidths.length){
    cg=`<colgroup>${colWidths.map(w=>`<col style="width:${w}">`).join('')}</colgroup>`;
  }
  // Inject 8px spacer rows between data rows
  const spacer=`<tr class="spacer"><td colspan="${colCount}" style="height:8px;padding:0;background:transparent"></td></tr>`;
  const spacedRows=rows.replace(/<\/tr>\s*(?=<tr(?! class="spacer"))/g,`</tr>${spacer}`);
  return`<div class="table-container"><table>${cg}<thead><tr>${headers}</tr></thead><tbody>${spacer}${spacedRows}</tbody></table>${empty?`<div class="empty-state">${EMPTY_SVG}<span class="empty-state-caption">Nothing to see here....yet!</span></div>`:''}</div>`;
}

// ── INTERACTIONS ──
function toggleStar(e,prefix,i){
  e.stopPropagation();
  const k=prefix+'-'+i;
  const wasStarred=S.starred.has(k);
  wasStarred?S.starred.delete(k):S.starred.add(k);
  const dataMap={
    'rec':RECENT_DOCS,'shared':SHARED_DOCS,
    'adm-acct':ADMIN_ACCOUNTS,'adm-team':ADMIN_TEAMS,'adm-ws':ADMIN_WORKSPACES,'adm-proj':ADMIN_PROJECTS,
    'ap-proj':ADMIN_PROJECTS,'ap-team':ADMIN_TEAMS,'ap-ws':ADMIN_WORKSPACES
  };
  const docList=dataMap[prefix]||null;
  const item=docList&&docList[i];
  const docName=item?(item.name||null):null;
  const msg=wasStarred
    ? (docName?`Removed "${docName}" from Favorites`:'Removed from Favorites')
    : (docName?`Added "${docName}" to Favorites`:'Added to Favorites');
  showToast(msg);
  render();
}

function openCtx(e){
  e.stopPropagation();
  const m=document.getElementById('ctx-menu');
  const btn=e.target.closest('button');
  const tr=btn.closest('tr');
  // If this row's menu is already open, close it
  if(m.classList.contains('visible') && tr && tr.classList.contains('ctx-open')){
    closeCtx();
    return;
  }
  // Clear any previously pinned row
  document.querySelectorAll('tbody tr.ctx-open').forEach(r=>r.classList.remove('ctx-open'));
  m.classList.add('visible');
  if(tr) tr.classList.add('ctx-open');
  const r=btn.getBoundingClientRect();
  let top=r.bottom+8;
  let left=r.right-170;
  if(top+220>window.innerHeight) top=r.top-220-8;
  if(left<8) left=8;
  m.style.left=left+'px';
  m.style.top=top+'px';
}

function closeCtx(){
  document.getElementById('ctx-menu').classList.remove('visible');
  document.querySelectorAll('tbody tr.ctx-open').forEach(r=>r.classList.remove('ctx-open'));
}

function ctxAction(a){
  closeCtx();
  const msgs={rename:'Rename dialog coming soon!',duplicate:'Document duplicated!',group:'Grouped into folder!',move:'Move dialog coming soon!',delete:'Document deleted.'};
  if(a==='delete'){if(!confirm('Delete this item?'))return;}
  showToast(msgs[a]);
}

document.addEventListener('click',()=>{
  closeCtx();
  closeAllPills();
});

// ── MODAL ──
function openNewDocModal(){document.getElementById('modal-backdrop').classList.add('visible');setTimeout(()=>document.getElementById('doc-name-input').focus(),80);}
function closeModal(e){if(!e||e.target===document.getElementById('modal-backdrop')){document.getElementById('modal-backdrop').classList.remove('visible');document.getElementById('doc-name-input').value='';document.querySelectorAll('.doc-type-option').forEach((el,i)=>el.classList.toggle('selected',i===0));}}
function selectType(el){document.querySelectorAll('.doc-type-option').forEach(o=>o.classList.remove('selected'));el.classList.add('selected');}
function createDoc(){const n=document.getElementById('doc-name-input').value.trim();if(!n){document.getElementById('doc-name-input').focus();return;}closeModal();showToast(`"${n}" created!`);}

// ── TOAST ──
function showToast(msg){const t=document.createElement('div');t.style.cssText=`position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:#111827;color:#fff;padding:8px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:all 0.18s;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.22)`;t.textContent=msg;document.body.appendChild(t);requestAnimationFrame(()=>{t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';});setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),250);},2400);}

// ── BOOT ──
initSidebar();
navigate('recent');
